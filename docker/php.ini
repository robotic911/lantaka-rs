; ── Errors (production: log, don't display) ──────────────────
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Limits ───────────────────────────────────────────────────
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
post_max_size = 50M
upload_max_filesize = 50M

; ── Session ──────────────────────────────────────────────────
session.gc_maxlifetime = 7200

; ── OPcache (significant performance boost) ──────────────────
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
; In production, files don't change — validate_timestamps=0 is fastest.
; Set to 1 only if you hot-patch files directly in the container.
opcache.validate_timestamps = 0
opcache.save_comments = 1

; ── Realpath cache (speeds up file lookups) ──────────────────
realpath_cache_size = 4096K
realpath_cache_ttl = 600
